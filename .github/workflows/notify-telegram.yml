name: Notify Telegram on new digest

on:
  push:
    branches: [main]
    paths:
      - 'magazines/*.html'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new digest file
        id: find
        run: |
          NEW_FILE=$(git diff --name-only --diff-filter=A HEAD^ HEAD \
            | grep '^magazines/.*\.html$' | head -n 1)
          if [ -z "$NEW_FILE" ]; then
            NEW_FILE=$(git diff --name-only --diff-filter=M HEAD^ HEAD \
              | grep '^magazines/.*\.html$' | head -n 1)
          fi
          echo "file=$NEW_FILE" >> $GITHUB_OUTPUT
          BASENAME=$(basename "$NEW_FILE" .html)
          echo "date=$BASENAME" >> $GITHUB_OUTPUT

      - name: Wait for GitHub Pages deploy
        if: steps.find.outputs.file != ''
        run: sleep 60

      - name: Send to Telegram
        if: steps.find.outputs.file != ''
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DATE: ${{ steps.find.outputs.date }}
        run: |
          URL="https://teemalex18.github.io/AdTech-digest/magazines/${DATE}.html"
          TEXT="🧪 *Тестовый AdTech-дайджест* (${DATE})
          ${URL}"
          curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode=Markdown \
            --data-urlencode "text=${TEXT}"
